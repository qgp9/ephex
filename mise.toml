[tools]
node = "lts"
wrangler = "latest"

[env]
# in case of sharp/node-gpp error for wrangler in Mac
SHARP_IGNORE_GLOBAL_LIBVIPS = "1"
# Keep Wrangler state inside the workspace for AI agents and other restricted environments.
XDG_CONFIG_HOME = "{{cwd}}/.tmp-config"
XDG_CACHE_HOME = "{{cwd}}/.tmp-cache"

[tasks]
dev = "wrangler dev"
"db:init" = "wrangler d1 execute ephex-db --local --file=schema.sql"
deploy = "wrangler deploy"
"db:remote" = "wrangler d1 execute ephex-db --remote --file=schema.sql"
